<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>LuLuLu — モバイルサイト提案</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECE7DC; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
  #root { width: 100%; height: 100vh; }

  .pitch-footer {
    position: fixed; right: 28px; bottom: 24px;
    z-index: 200; pointer-events: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: rgba(40, 32, 24, 0.5);
    text-align: right;
  }
  .pitch-footer strong {
    display: block;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; letter-spacing: 0.04em;
    color: rgba(40, 32, 24, 0.85); text-transform: none;
    font-weight: 500;
  }

  .phone-iframe {
    width: 100%; height: 100%;
    border: 0; background: #F4F1EA; display: block;
  }
  .phone-content {
    position: absolute; inset: 0;
  }
</style>
</head>
<body>

<div class="pitch-footer">
  <strong>For the modern traveler</strong>
  20–40s · Solo · International
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./design-canvas.jsx"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel" src="./browser-window.jsx"></script>

<script type="text/babel">
  const PhoneFrame = ({ src }) => (
    <IOSDevice width={402} height={874}>
      <div style={{ paddingTop: 54, height: '100%', boxSizing: 'border-box' }}>
        <iframe className="phone-iframe" src={src} title={src} />
      </div>
    </IOSDevice>
  );

  const PCFrame = ({ src, url, title }) => (
    <ChromeWindow
      width={1280}
      height={800}
      url={url}
      tabs={[{ title }]}
      activeIndex={0}
    >
      <iframe className="phone-iframe" src={src} title={src} style={{ width: '100%', height: '100%' }} />
    </ChromeWindow>
  );

  const App = () => (
    <DesignCanvas>
      <DCSection
        id="mobile"
        title="LuLuLu — Mobile (スマホファースト)"
        subtitle="① Home JP · ② Reviews · ③ Home EN — 20-40代ビジネスマン向け / 高知ゲストハウス LuLuLu リニューアル"
        gap={56}
      >
        <DCArtboard id="jp-home" label="01 — Home (JP)" width={402} height={874}>
          <PhoneFrame src="index.html" />
        </DCArtboard>

        <DCArtboard id="reviews" label="02 — Reviews 紹介ページ" width={402} height={874}>
          <PhoneFrame src="reviews.html" />
        </DCArtboard>

        <DCArtboard id="en-home" label="03 — Home (English)" width={402} height={874}>
          <PhoneFrame src="home-en.html" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="desktop"
        title="LuLuLu — Desktop"
        subtitle="同じソースを 1 つのレスポンシブシステムで展開 — 同じ Web サイトが PC でもエディトリアルな表情に"
        gap={72}
      >
        <DCArtboard id="jp-home-pc" label="01 — Home PC (JP)" width={1280} height={800}>
          <PCFrame src="index.html" url="lululu.jp" title="ゲストハウス ルルル | 高知" />
        </DCArtboard>

        <DCArtboard id="reviews-pc" label="02 — Reviews PC" width={1280} height={800}>
          <PCFrame src="reviews.html" url="lululu.jp/reviews" title="レビュー紹介 | ルルル" />
        </DCArtboard>

        <DCArtboard id="en-home-pc" label="03 — Home PC (EN)" width={1280} height={800}>
          <PCFrame src="home-en.html" url="lululu.jp/en" title="Guesthouse LuLuLu | Kochi" />
        </DCArtboard>
      </DCSection>

      <DCPostIt top={-30} left={420} rotate={-3} width={210}>
        <strong>Why this direction</strong><br/>
        WeBase 高松のような<br/>
        編集的・写真主役の構成で、<br/>
        20–40代に響く落ち着いた<br/>
        モダンクラフト感を表現。
      </DCPostIt>

      <DCPostIt top={920} left={70} rotate={2} width={220}>
        <strong>Design system</strong><br/>
        • 余白＆和欧混植タイポ<br/>
        • ベージュ＋深緑＋墨黒<br/>
        • フラット／装飾は最小<br/>
        • 写真がヒーロー
      </DCPostIt>

      <DCPostIt top={920} left={920} rotate={-1.5} width={230}>
        <strong>UX hooks</strong><br/>
        • Sticky bottom予約CTA<br/>
        • 言語切替を常時表示<br/>
        • レビュー数を一番の武器に<br/>
        • チップで絞り込み可能
      </DCPostIt>
    </DesignCanvas>
  );

  // Wait for design canvas + ios frame globals to load
  function boot() {
    if (!window.DesignCanvas || !window.IOSDevice || !window.ChromeWindow) {
      return setTimeout(boot, 30);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
  boot();
</script>

</body>
</html>
