<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/favicon/favicon.ico" sizes="any">
<title>資料ダウンロード｜MITシステム研究所</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#173f2a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111827;
    --ink-2: #263447;
    --muted: #475569;
    --line: #d9e6df;
    --paper: #f5f8f4;
    --white: #fff;
    --green: #1f5f3f;
    --green-2: #2f8a50;
    --deep: #132f21;
    --shadow: 0 24px 70px rgba(17, 24, 39, 0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans JP', 'Noto Sans JP', sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; }
  .site-header {
    background: rgba(255, 255, 255, 0.95);
    border-bottom: 1px solid var(--line);
  }
  .nav {
    max-width: 1180px;
    height: 76px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .brand {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    text-decoration: none;
  }
  .brand-logo { display: block; width: 210px; height: auto; }
  .back-link {
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56px 16px;
  }
  .complete-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 52px 48px;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .check-icon {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: #edf8f0;
    border: 2px solid #b7d9bf;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .check-icon svg { width: 32px; height: 32px; color: var(--green); }
  h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(22px, 4vw, 28px);
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .lead {
    color: var(--ink-2);
    font-size: 14px;
    line-height: 1.9;
    margin-bottom: 32px;
  }
  .download-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 56px;
    padding: 14px 32px;
    border-radius: 10px;
    background: var(--green);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 16px 34px rgba(31, 95, 63, 0.26);
    transition: background 0.2s, transform 0.2s;
    width: 100%;
  }
  .download-btn:hover { background: #174a31; transform: translateY(-1px); }
  .download-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sub-links {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 13px;
  }
  .sub-links a {
    color: var(--green);
    text-decoration: none;
    font-weight: 700;
    border-bottom: 1px solid rgba(31, 95, 63, 0.3);
    padding-bottom: 1px;
  }
  @media (max-width: 600px) {
    .complete-card { padding: 36px 20px; }
    .nav { padding: 0 16px; }
    .brand-logo { width: 174px; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="メインナビゲーション">
      <a class="brand" href="../" aria-label="MITシステム研究所 トップ">
        <img class="brand-logo" src="../assets/logo/mitsys-logo.png" alt="株式会社MITシステム研究所">
      </a>
      <a class="back-link" href="../">トップへ戻る</a>
    </nav>
  </header>

  <main>
    <div class="complete-card">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>ご送信ありがとうございます</h1>
      <p class="lead">
        資料のご請求を承りました。<br>
        下のボタンから今すぐ資料をダウンロードいただけます。
      </p>
      <a class="download-btn" href="../assets/docs/quickcrm-service-guide.pdf" download="QuickCRM_サービスガイド.pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        資料をダウンロードする
      </a>
      <div class="sub-links">
        <a href="../">トップへ戻る</a>
        <a href="../download/">資料請求フォームへ</a>
      </div>
    </div>
  </main>
</body>
</html>
