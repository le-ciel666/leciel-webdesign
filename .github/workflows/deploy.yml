name: Deploy to Lolipop

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to root (leciel.cutegirl.jp)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.leciel.cutegirl.jp
          username: cutegirl.jp-leciel
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          exclude: |
            **/.DS_Store
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            _secrets.php
            _secrets.example.php
            ai_organization/**
            # 納品用の内部ツール（手順書・ZIP書き出しスクリプト）は公開しない
            mock-sites/mitsys-renewal_delivery/**
            # ブログの内部運用ドキュメント（SEO戦略メモ）は公開しない
            blog/CONTENT-PLAN.md
            # WordPressをインストールしたディレクトリはFTPデプロイで上書き・削除しない
            # （静的同期するとサーバー側のWP本体が壊れるため、mock-sites/配下のパスで除外）
            mock-sites/prime-networks/**
            mock-sites/blueport/**
            mock-sites/azusa/**

      - name: Deploy to leciel subfolder (leciel-webdesign.com)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.leciel.cutegirl.jp
          username: cutegirl.jp-leciel
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /leciel/
          exclude: |
            **/.DS_Store
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            _secrets.php
            _secrets.example.php
            ai_organization/**
            # 納品用の内部ツール（手順書・ZIP書き出しスクリプト）は公開しない
            mock-sites/mitsys-renewal_delivery/**
            # ブログの内部運用ドキュメント（SEO戦略メモ）は公開しない
            blog/CONTENT-PLAN.md
            # WordPressをインストールしたディレクトリはFTPデプロイで上書き・削除しない
            # （静的同期するとサーバー側のWP本体が壊れるため、mock-sites/配下のパスで除外）
            mock-sites/prime-networks/**
            mock-sites/blueport/**
            mock-sites/azusa/**
