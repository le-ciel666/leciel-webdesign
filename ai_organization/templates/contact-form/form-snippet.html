<!--
  =====================================================================
  お問い合わせフォーム 一式（HTML + CSS + JS）
  =====================================================================
  使い方:
    クライアントサイトの index.html に以下の3パートをそれぞれ貼り付ける。
    色・サイズ等のデザインはクライアントサイトのテーマに合わせて微調整。
  =====================================================================
-->

<!-- ===== [1] CSS：<style> 内 or 外部CSSに追記 ============================= -->
<style>
.contact-form {
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 16px;
  padding: 40px;
  max-width: 680px;
  margin: 0 auto;
}
.form-row { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.2);
  background: #fff;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: #4a86e8; }
textarea.form-input { resize: vertical; min-height: 130px; }
.form-submit {
  width: 100%;
  padding: 16px;
  background: #333;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.2s;
  font-family: inherit;
}
.form-submit:hover { opacity: 0.9; }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.form-error {
  display: none;
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.3);
  color: #b91c1c;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.6;
}
.form-error.is-visible { display: block; }
.form-success {
  display: none;
  margin: 24px auto 0;
  max-width: 680px;
  padding: 36px 28px;
  background: #f8f8f8;
  border: 1px solid #ddd;
  border-radius: 12px;
  text-align: center;
}
.form-success.is-visible { display: block; }
.form-success .check {
  width: 52px; height: 52px; margin: 0 auto 14px;
  border-radius: 50%; background: #16a34a;
  color: #fff; font-size: 26px; line-height: 52px;
}
.form-success h3 { font-size: 18px; margin: 4px 0 12px; }
.form-success p { font-size: 14px; line-height: 1.8; margin: 0 0 10px; color: #555; }
.form-success .note {
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid #ddd;
  font-size: 12px; color: #777; line-height: 1.7;
}
</style>

<!-- ===== [2] HTML：問い合わせセクションに配置 =========================== -->
<form class="contact-form" id="contactForm" novalidate>
  <div class="form-row">
    <label class="form-label" for="cf-name">お名前 / 会社名</label>
    <input id="cf-name" type="text" name="name" class="form-input" placeholder="例）山田太郎" required>
  </div>
  <div class="form-row">
    <label class="form-label" for="cf-email">メールアドレス</label>
    <input id="cf-email" type="email" name="email" class="form-input" placeholder="例）info@example.com" required>
  </div>
  <div class="form-row">
    <label class="form-label" for="cf-business">業種・業態（任意）</label>
    <input id="cf-business" type="text" name="businessType" class="form-input" placeholder="例）美容室 / 飲食店">
  </div>
  <div class="form-row">
    <label class="form-label" for="cf-message">ご相談内容</label>
    <textarea id="cf-message" name="message" class="form-input" placeholder="お気軽にどうぞ。" required></textarea>
  </div>
  <div class="form-row">
    <label class="form-label" for="cf-ref">参考URL（任意）</label>
    <input id="cf-ref" type="url" name="referenceUrl" class="form-input" placeholder="https://...">
  </div>
  <button type="submit" class="form-submit" id="contactSubmit">送信する</button>
  <div class="form-error" id="contactError" role="alert" aria-live="polite"></div>
</form>

<div class="form-success" id="contactSuccess" role="status" aria-live="polite">
  <div class="check">✓</div>
  <h3>お問い合わせありがとうございます。</h3>
  <p>ご入力いただいたメールアドレスへ、確認メールをお送りいたしました。<br>内容を確認のうえ、担当より2営業日以内にご連絡差し上げます。</p>
  <p>今しばらくお待ちくださいませ。</p>
  <div class="note">
    ※ 確認メールが届かない場合は迷惑メールフォルダもご確認ください。<br>
    届いていない場合は <a href="mailto:CHANGE-ME@example.com">CHANGE-ME@example.com</a> まで直接ご連絡ください。
  </div>
</div>

<!-- ===== [3] JS：</body> 直前に配置 ====================================== -->
<script>
(function(){
  const form = document.getElementById('contactForm');
  if (!form) return;
  const submitBtn = document.getElementById('contactSubmit');
  const errorBox = document.getElementById('contactError');
  const successBox = document.getElementById('contactSuccess');

  function showError(msg){
    errorBox.textContent = msg;
    errorBox.classList.add('is-visible');
  }
  function clearError(){
    errorBox.textContent = '';
    errorBox.classList.remove('is-visible');
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    clearError();

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const fd = new FormData(form);
    const payload = {
      name:         (fd.get('name')         || '').toString().trim(),
      email:        (fd.get('email')        || '').toString().trim(),
      businessType: (fd.get('businessType') || '').toString().trim(),
      message:      (fd.get('message')      || '').toString().trim(),
      referenceUrl: (fd.get('referenceUrl') || '').toString().trim()
    };

    submitBtn.disabled = true;
    const originalLabel = submitBtn.textContent;
    submitBtn.textContent = '送信中…';

    try {
      const res = await fetch('/contact.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      let data = {};
      try { data = await res.json(); } catch (_) {}
      if (!res.ok || !data.ok) {
        throw new Error(data.error || '送信に失敗しました。時間をおいて再度お試しください。');
      }
      form.style.display = 'none';
      successBox.classList.add('is-visible');
      successBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      showError(err.message || '送信に失敗しました。時間をおいて再度お試しください。');
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
    }
  });
})();
</script>
