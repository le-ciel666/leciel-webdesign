<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">LE CIEL WEB DESIGN official account icon</title>
  <desc id="desc">Official account icon based on the LE CIEL WEB DESIGN favicon rainbow ring.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eaf2ff"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="386" fill="#ffffff" opacity="0.78" filter="url(#softShadow)"/>

  <g transform="rotate(-90 512 512)" fill="none" stroke-width="118" stroke-linecap="butt">
    <circle cx="512" cy="512" r="286" stroke="#ef4444" stroke-dasharray="251.5 1545.8"/>
    <circle cx="512" cy="512" r="286" stroke="#f97316" stroke-dasharray="251.5 1545.8" stroke-dashoffset="-251.5"/>
    <circle cx="512" cy="512" r="286" stroke="#eab308" stroke-dasharray="269.5 1527.8" stroke-dashoffset="-503.0"/>
    <circle cx="512" cy="512" r="286" stroke="#22c55e" stroke-dasharray="251.5 1545.8" stroke-dashoffset="-772.5"/>
    <circle cx="512" cy="512" r="286" stroke="#06b6d4" stroke-dasharray="251.5 1545.8" stroke-dashoffset="-1024.0"/>
    <circle cx="512" cy="512" r="286" stroke="#3b82f6" stroke-dasharray="269.5 1527.8" stroke-dashoffset="-1275.5"/>
    <circle cx="512" cy="512" r="286" stroke="#a855f7" stroke-dasharray="251.5 1545.8" stroke-dashoffset="-1545.0"/>
  </g>

  <circle cx="512" cy="512" r="202" fill="#ffffff"/>
  <text x="512" y="482" fill="#0f172a" font-family="Noto Sans JP, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="4" text-anchor="middle">LE CIEL</text>
  <text x="512" y="570" fill="#2563eb" font-family="Noto Sans JP, Arial, sans-serif" font-size="49" font-weight="800" letter-spacing="8" text-anchor="middle">WEB DESIGN</text>
  <rect x="368" y="620" width="288" height="8" rx="4" fill="#e2e8f0"/>
</svg>
