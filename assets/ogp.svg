<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="35%" stop-color="#ede9fe"/>
      <stop offset="70%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="33%" stop-color="#ec4899"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles (blurred effect via opacity) -->
  <circle cx="100" cy="100" r="200" fill="#a5f3fc" opacity="0.25"/>
  <circle cx="1100" cy="530" r="250" fill="#c4b5fd" opacity="0.2"/>
  <circle cx="1050" cy="80" r="150" fill="#fde68a" opacity="0.2"/>
  <circle cx="200" cy="560" r="180" fill="#bbf7d0" opacity="0.2"/>

  <!-- Logo mark (rainbow ring) -->
  <g transform="translate(88, 60)">
    <g transform="rotate(-90, 40, 40)" fill="none" stroke-width="14" stroke-linecap="butt">
      <circle cx="40" cy="40" r="28" stroke="#ef4444" stroke-dasharray="24.63 151.05"/>
      <circle cx="40" cy="40" r="28" stroke="#f97316" stroke-dasharray="24.63 151.05" stroke-dashoffset="-24.63"/>
      <circle cx="40" cy="40" r="28" stroke="#eab308" stroke-dasharray="26.39 149.29" stroke-dashoffset="-49.26"/>
      <circle cx="40" cy="40" r="28" stroke="#22c55e" stroke-dasharray="24.63 151.05" stroke-dashoffset="-75.65"/>
      <circle cx="40" cy="40" r="28" stroke="#06b6d4" stroke-dasharray="24.63 151.05" stroke-dashoffset="-100.28"/>
      <circle cx="40" cy="40" r="28" stroke="#3b82f6" stroke-dasharray="26.39 149.29" stroke-dashoffset="-124.91"/>
      <circle cx="40" cy="40" r="28" stroke="#a855f7" stroke-dasharray="24.63 151.05" stroke-dashoffset="-151.30"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="168" y="98" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="4" fill="#0f172a">LE CIEL WEB DESIGN</text>
  <text x="170" y="128" font-family="Helvetica, sans-serif" font-size="16" fill="#64748b" letter-spacing="2">ル・シエルウェブデザイン</text>

  <!-- Divider -->
  <rect x="88" y="160" width="1024" height="2" fill="#e2e8f0"/>

  <!-- Main headline -->
  <text x="88" y="280" font-family="Helvetica, Arial, sans-serif" font-size="68" font-weight="900" fill="#0f172a">あなたのビジネスの魅力を</text>
  <text x="88" y="370" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#titleGrad)">WEBで、しっかり届ける。</text>

  <!-- Sub copy -->
  <text x="88" y="440" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#475569">個人店舗・個人事業主から法人企業まで　ホームページ制作・LP制作</text>

  <!-- Badges -->
  <rect x="88" y="490" width="210" height="52" rx="26" fill="#2563eb"/>
  <text x="193" y="522" font-family="Helvetica, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">全国オンライン対応</text>

  <rect x="314" y="490" width="180" height="52" rx="26" fill="white" stroke="#2563eb" stroke-width="2"/>
  <text x="404" y="522" font-family="Helvetica, sans-serif" font-size="20" font-weight="700" fill="#2563eb" text-anchor="middle">無料相談受付中</text>

  <rect x="510" y="490" width="160" height="52" rx="26" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="590" y="522" font-family="Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10b981" text-anchor="middle">5万円〜対応</text>

  <!-- URL -->
  <text x="1112" y="600" font-family="Helvetica, sans-serif" font-size="20" fill="#94a3b8" text-anchor="end">leciel-webdesign.com</text>
</svg>
