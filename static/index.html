<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルシエルウェブデザイン | Web制作・ホームページ制作</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      color: #0F1623;
      background: #FFFFFF;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; }
    input, textarea, button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
    input:focus, textarea:focus { outline: none; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu  { animation: fadeUp 0.9s ease both; }
    .fu1 { animation: fadeUp 0.9s 0.15s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const RB = 'linear-gradient(90deg,#FF6B6B,#FFA94D,#FFD93D,#6BCB77,#4D96FF,#7B61FF,#C77DFF)';
const NAVY = '#0F1623';
const SOFT = '#F7F9FC';

const useMobile = () => {
  const [m, setM] = useState(window.innerWidth <= 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth <= 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
};

const goTo = (id) => {
  const el = document.getElementById(id);
  if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
};

const RL = ({ w='48px', h='3px', style={} }) => (
  <div style={{ width:w, height:h, background:RB, borderRadius:'2px', ...style }} />
);

const ST = ({ en, ja, center=true }) => {
  const mob = useMobile();
  return (
    <div style={{ textAlign: center?'center':'left', marginBottom: mob?'40px':'64px' }}>
      <p style={{ fontFamily:'Syne,sans-serif', fontSize:'12px', letterSpacing:'0.28em', color:'#9CA3AF', textTransform:'uppercase', marginBottom:'12px' }}>{en}</p>
      <h2 style={{ fontFamily:'Noto Sans JP,sans-serif', fontSize: mob?'26px':'34px', fontWeight:'700', letterSpacing:'0.04em', lineHeight:1.4, marginBottom:'16px' }}>{ja}</h2>
      <RL style={{ margin: center?'0 auto':'0' }} />
    </div>
  );
};

/* ─── Nav ─── */
const Nav = () => {
  const [menuOpen, setMenuOpen] = useState(false);
  const mob = useMobile();
  const links = [['選ばれる理由','reasons'],['サービス','services'],['制作実績','portfolio'],['料金','pricing'],['よくある質問','faq'],['運営情報','company']];

  const handleLink = (id) => {
    setMenuOpen(false);
    setTimeout(() => goTo(id), 10);
  };

  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:200,
      background:'rgba(10,16,32,0.97)',
      backdropFilter:'blur(16px)',
      borderBottom:'1px solid rgba(255,255,255,0.07)',
      padding: mob ? '0 20px' : '0 56px',
      height:'70px',
      display:'flex', alignItems:'center', justifyContent:'space-between'
    }}>
      {/* Logo */}
      <div style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:'12px' }} onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
        <div style={{ width:'30px', height:'30px', borderRadius:'50%', background:RB, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <div style={{ width:'18px', height:'18px', borderRadius:'50%', background:'rgba(10,16,32,0.85)' }} />
        </div>
        <div>
          <div style={{ fontFamily:'Syne,sans-serif', fontSize: mob?'11px':'13px', fontWeight:'700', letterSpacing:'0.2em', color:'white', lineHeight:1.2, textTransform:'uppercase' }}>LE CIEL WEB DESIGN</div>
          <div style={{ fontSize:'10px', letterSpacing:'0.12em', color:'rgba(255,255,255,0.4)', marginTop:'2px', fontFamily:'Noto Sans JP' }}>ル・シエルウェブデザイン</div>
        </div>
      </div>

      {/* Desktop links */}
      {!mob && (
        <div style={{ display:'flex', gap:'28px', alignItems:'center' }}>
          {links.map(([l,id]) => (
            <button key={id} onClick={() => handleLink(id)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:'14px', color:'rgba(255,255,255,0.72)', letterSpacing:'0.04em', fontFamily:'Noto Sans JP', fontWeight:'400', transition:'color 0.2s' }}
              onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.72)'}>{l}</button>
          ))}
          <button onClick={() => handleLink('contact')} style={{ background:RB, color:'white', border:'none', padding:'10px 22px', borderRadius:'4px', fontSize:'14px', letterSpacing:'0.06em', cursor:'pointer', fontFamily:'Noto Sans JP', fontWeight:'500', transition:'opacity 0.2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.82'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>お問い合わせ</button>
        </div>
      )}

      {/* Hamburger */}
      {mob && (
        <button onClick={() => setMenuOpen(!menuOpen)} style={{ background:'none', border:'none', cursor:'pointer', padding:'8px', display:'flex', flexDirection:'column', gap:'5px' }}>
          {[0,1,2].map(i => (
            <span key={i} style={{ display:'block', width:'22px', height:'2px', background:'white', borderRadius:'2px',
              transition:'all 0.3s',
              transform: menuOpen ? (i===0?'rotate(45deg) translateY(7px)': i===2?'rotate(-45deg) translateY(-7px)':'scaleX(0)') : 'none',
              opacity: menuOpen && i===1 ? 0 : 1
            }} />
          ))}
        </button>
      )}

      {/* Mobile menu */}
      {mob && menuOpen && (
        <div style={{ position:'absolute', top:'70px', left:0, right:0, background:'rgba(10,16,32,0.98)', backdropFilter:'blur(16px)', borderBottom:'1px solid rgba(255,255,255,0.07)', padding:'20px', display:'flex', flexDirection:'column', gap:'4px' }}>
          {links.map(([l,id]) => (
            <button key={id} onClick={() => handleLink(id)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:'16px', color:'rgba(255,255,255,0.8)', letterSpacing:'0.04em', fontFamily:'Noto Sans JP', padding:'14px 8px', textAlign:'left', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>{l}</button>
          ))}
          <button onClick={() => handleLink('contact')} style={{ marginTop:'12px', background:RB, color:'white', border:'none', padding:'14px', borderRadius:'6px', fontSize:'15px', letterSpacing:'0.08em', cursor:'pointer', fontFamily:'Noto Sans JP', fontWeight:'700' }}>無料でお問い合わせ</button>
        </div>
      )}
    </nav>
  );
};

/* ─── Hero ─── */
const Hero = () => {
  const mob = useMobile();
  return (
    <section style={{
      minHeight:'100vh', padding: mob ? '110px 24px 70px' : '130px 56px 90px',
      background:'linear-gradient(175deg,#EBF1FB 0%,#F4F7FD 35%,#FFFFFF 70%)',
      display:'flex', alignItems:'center', position:'relative', overflow:'hidden'
    }}>
      <div style={{ position:'absolute', top:'-5%', right:'0', width:'55%', height:'110%', background:'radial-gradient(ellipse at 60% 40%,rgba(77,150,255,0.09) 0%,rgba(199,125,255,0.06) 50%,transparent 80%)', pointerEvents:'none' }} />
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:'3px', background:RB }} />

      <div style={{ maxWidth:'1240px', margin:'0 auto', width:'100%', display:'grid', gridTemplateColumns: mob ? '1fr' : '1fr 1fr', gap: mob?'48px':'96px', alignItems:'center' }}>
        <div className="fu">
          <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'24px' }}>
            <div style={{ width:'28px', height:'1px', background:RB }} />
            <span style={{ fontFamily:'Syne,sans-serif', fontSize:'12px', letterSpacing:'0.28em', color:'#7B61FF', textTransform:'uppercase' }}>LE CIEL Web Design</span>
          </div>
          <h1 style={{ fontFamily:'Noto Sans JP,sans-serif', fontSize: mob?'36px':'58px', fontWeight:'700', lineHeight:1.3, letterSpacing:'0.02em', color:NAVY, marginBottom:'28px' }}>
            空のように、<br />
            <span style={{ background:RB, WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>広がる可能性</span>を<br />
            あなたのお店へ。
          </h1>
          <p style={{ fontSize:'15px', color:'#4B5563', lineHeight:2.0, marginBottom:'36px' }}>
            美容室・居酒屋・整体院・カフェなど、個人事業主・小規模店舗さまの集客をWebサイトで支援します。シンプルで洗練されたデザインと確かな技術で、あなたのお店の魅力を最大限に引き出します。
          </p>
          <div style={{ display:'flex', gap:'12px', flexWrap:'wrap' }}>
            <button onClick={() => goTo('contact')} style={{ padding:'14px 30px', background:NAVY, color:'white', border:'none', borderRadius:'4px', fontSize:'14px', letterSpacing:'0.08em', cursor:'pointer', fontFamily:'Noto Sans JP', fontWeight:'500', transition:'all 0.3s ease', flexShrink:0 }}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 10px 28px rgba(15,22,35,0.22)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>無料でお問い合わせ</button>
            <button onClick={() => goTo('portfolio')} style={{ padding:'14px 30px', background:'transparent', color:NAVY, border:'1px solid rgba(15,22,35,0.18)', borderRadius:'4px', fontSize:'14px', letterSpacing:'0.08em', cursor:'pointer', fontFamily:'Noto Sans JP', transition:'all 0.3s ease', flexShrink:0 }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=NAVY;e.currentTarget.style.background='rgba(15,22,35,0.03)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(15,22,35,0.18)';e.currentTarget.style.background='transparent';}}>制作実績を見る</button>
          </div>
        </div>

        {/* Stacked photo cards */}
        {!mob && (
          <div className="fu1" style={{ position:'relative', height:'480px' }}>
            <div style={{ position:'absolute', top:'20px', right:'0', width:'78%', borderRadius:'14px', overflow:'hidden', boxShadow:'0 16px 48px rgba(15,22,35,0.10)', transform:'rotate(3.5deg)', transformOrigin:'bottom right' }}>
              <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=600&q=80" alt="カフェサイト" style={{ width:'100%', height:'200px', objectFit:'cover', display:'block' }} />
              <div style={{ background:'white', padding:'16px 20px' }}>
                <div style={{ fontSize:'11px', color:'#9CA3AF', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'4px' }}>Café</div>
                <div style={{ fontSize:'15px', fontWeight:'700', color:NAVY }}>Café Soleil</div>
              </div>
            </div>
            <div style={{ position:'absolute', bottom:'0', left:'0', width:'80%', borderRadius:'14px', overflow:'hidden', boxShadow:'0 28px 72px rgba(15,22,35,0.15)', transform:'rotate(-2.5deg)', transformOrigin:'bottom left' }}>
              <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&q=80" alt="サロンサイト" style={{ width:'100%', height:'220px', objectFit:'cover', display:'block' }} />
              <div style={{ background:'white', padding:'16px 20px' }}>
                <div style={{ fontSize:'11px', color:'#9CA3AF', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'4px' }}>Beauty Salon</div>
                <div style={{ fontSize:'15px', fontWeight:'700', color:NAVY }}>Beauty &amp; Relax Ciel</div>
              </div>
              <div style={{ height:'3px', background:RB }} />
            </div>
          </div>
        )}

        {/* Mobile: single image */}
        {mob && (
          <div style={{ borderRadius:'14px', overflow:'hidden', boxShadow:'0 20px 60px rgba(15,22,35,0.12)' }}>
            <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=700&q=80" alt="サロンサイト" style={{ width:'100%', height:'220px', objectFit:'cover', display:'block' }} />
            <div style={{ background:'white', padding:'16px 20px' }}>
              <div style={{ fontSize:'11px', color:'#9CA3AF', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:'4px' }}>Beauty Salon</div>
              <div style={{ fontSize:'15px', fontWeight:'700', color:NAVY }}>Beauty &amp; Relax Ciel</div>
            </div>
            <div style={{ height:'3px', background:RB }} />
          </div>
        )}
      </div>
    </section>
  );
};

/* ─── Reasons ─── */
const reasonsData = [
  { icon:'✦', title:'シンプルで洗練されたデザイン', desc:'流行に左右されない、時代を超えて愛されるWebデザインを提供します。お客様のブランドを大切にしながら、訪問者の心に残るサイトを制作します。' },
  { icon:'◈', title:'集客・成果にこだわった設計', desc:'デザインの美しさだけでなく、予約・問い合わせにつながる動線設計を重視します。SEO対策やスマートフォン対応も標準で対応しています。' },
  { icon:'◉', title:'丁寧なヒアリングとサポート', desc:'お客様のビジネスや想いを深くヒアリングし、コンセプトから一緒に考えます。納品後も安心のサポートで、長くお付き合いいただけます。' },
  { icon:'◆', title:'明瞭な料金と迅速な対応', desc:'追加費用なしの明瞭な料金設定と、最短2週間のスピード納品。クラウドワークス・ココナラでも多数の高評価をいただいています。' },
];

const Reasons = () => {
  const mob = useMobile();
  return (
    <section id="reasons" style={{ padding: mob?'72px 24px':'120px 56px', background:'#fff' }}>
      <div style={{ maxWidth:'1240px', margin:'0 auto' }}>
        <ST en="Why Choose Us" ja="選ばれる理由" />
        <div style={{ display:'grid', gridTemplateColumns: mob?'1fr':'repeat(4,1fr)', gap:'20px' }}>
          {reasonsData.map((r,i) => (
            <div key={i} style={{ padding:'32px 26px', background:'white', border:'1px solid rgba(15,22,35,0.07)', borderRadius:'8px', position:'relative', overflow:'hidden', transition:'all 0.3s ease' }}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-5px)';e.currentTarget.style.boxShadow='0 20px 60px rgba(15,22,35,0.09)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>
              <div style={{ position:'absolute', top:0, left:0, right:0, height:'3px', background:RB }} />
              <div style={{ fontSize:'24px', marginBottom:'16px', color:NAVY }}>{r.icon}</div>
              <h3 style={{ fontFamily:'Noto Sans JP,sans-serif', fontSize:'16px', fontWeight:'700', lineHeight:1.6, letterSpacing:'0.03em', marginBottom:'12px' }}>{r.title}</h3>
              <p style={{ fontSize:'14px', color:'#6B7280', lineHeight:1.9 }}>{r.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

/* ─── Services ─── */
const servicesData = [
  { title:'ホームページ制作', price:'¥100,000〜', desc:'個人事業主・小規模店舗向けの新規ホームページ制作。ヒアリングからデザイン・コーディング・公開まで一括対応。お客様のブランドと想いを丁寧に表現します。', tags:['HTML/CSS','レスポンシブ対応','SEO基本設定','お問い合わせフォーム'] },
  { title:'サイトリニューアル', price:'¥100,000〜', desc:'古くなったサイトのデザインリニューアル。既存のコンテンツや構成を活かしながら、現代的でおしゃれなデザインに刷新します。', tags:['デザイン刷新','スマホ最適化','コンテンツ移行'] },
  { title:'LP（ランディングページ）制作', price:'¥50,000〜', desc:'キャンペーンや新サービス向けのランディングページ制作。問い合わせ・予約につながるコンバージョン重視の設計で、集客効果を高めます。', tags:['単ページ完結','高速表示','フォーム設置'] },

      <div style={{ maxWidth:'1240px', margin:'0 auto' }}>

              onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor='transparent';}}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'14px', gap:'12px' }}>

                <span style={{ fontFamily:'Noto Sans JP,sans-serif', fontSize:'18px', fontWeight:'700', color:'#7B61FF', whiteSpace:'nowrap', flexShrink:0 }}>{s.price}</span>
              </div>
              <p style={{ fontSize:'14px', color:'#6B7280', lineHeight:1.95, marginBottom:'20px', flex:1 }}>{s.desc}</p>
              <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
                {s.tags.map(t => <span key={t} style={{ padding:'4px 12px', borderRadius:'100px', fontSize:'13px', color:'#4B5563', background:'rgba(15,22,35,0.05)', letterSpacing:'0.02em' }}>{t}</span>)}
              </div>
            </div>
          ))}

      </div>

};

/* ─── Portfolio ─── */
const portfolioData = [
  { cat:'美容室', title:'Hair Salon Lumière', img:'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=80', desc:'モノトーンベースで高級感を演出。オンライン予約機能と施術メニューを見やすく構成。', tags:['HTML/CSS','予約機能','レスポンシブ'], bg:'#F3F0FF', link:'hair-salon.html' },

  { cat:'整体院', title:'癒しの整体 こころ', img:'https://images.unsplash.com/photo-1519823551278-64ac92734fb1?w=700&q=80', desc:'清潔感と安心感を重視。症状別メニューの紹介と予約機能で新規集客を強化。', tags:['HTML/CSS','予約フォーム','SEO対応'], bg:'#F0FFF4', link:'seitai.html' },

];

const PCard = ({ item }) => {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      onClick={() => item.link && window.open(item.link, '_blank')}
      style={{ borderRadius:'10px', overflow:'hidden', background:'white', boxShadow: hov ? '0 28px 70px rgba(15,22,35,0.13)' : '0 4px 20px rgba(15,22,35,0.06)', transform: hov ? 'translateY(-5px)' : 'none', transition:'all 0.35s ease', cursor: item.link ? 'pointer' : 'default' }}>
      <div style={{ background:'#ECEEF2', padding:'10px 13px', display:'flex', alignItems:'center', gap:'6px' }}>

/* ─── CTA ─── */
const CTA = () => {
  const mob = useMobile();
  const [form, setForm] = useState({ name:'', email:'', message:'' });
  const [status, setStatus] = useState('idle');
  const [err, setErr] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setStatus('sending'); setErr('');
    try {
      const data = new FormData();
      data.append('name', form.name);
      data.append('email', form.email);
      data.append('message', form.message);
      const res = await fetch('/mail.php', { method:'POST', body:data });
      const json = await res.json();
      if (json.success) {
        setStatus('success');
        setForm({ name:'', email:'', message:'' });
      } else {
        setStatus('error');
        setErr(json.message || '送信に失敗しました。');
      }
    } catch {
      setStatus('error');
      setErr('通信エラーが発生しました。時間をおいて再度お試しください。');
    }
  };

  return (
    <section id="contact" style={{ padding: mob?'72px 24px':'130px 56px', background:NAVY, position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:'4px', background:RB }} />
      <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:'900px', height:'900px', background:'radial-gradient(circle,rgba(123,97,255,0.09) 0%,transparent 70%)', pointerEvents:'none' }} />

        <h2 style={{ fontFamily:'Noto Sans JP,sans-serif', fontSize: mob?'26px':'40px', fontWeight:'700', color:'white', lineHeight:1.4, marginBottom:'18px', letterSpacing:'0.03em' }}>あなたのビジネスを、<br />一緒に輝かせましょう。</h2>
        <p style={{ fontSize:'15px', color:'rgba(255,255,255,0.55)', lineHeight:2.0, marginBottom:'40px' }}>お見積もりは無料です。まずはお気軽にご相談ください。<br />クラウドワークス・ココナラからもお受けしています。</p>
        {status === 'success' ? (
          <div style={{ background:'rgba(255,255,255,0.05)', backdropFilter:'blur(12px)', borderRadius:'14px', padding: mob?'40px 20px':'64px 48px', border:'1px solid rgba(255,255,255,0.09)' }}>
            <div style={{ fontSize:'48px', marginBottom:'16px' }}>✓</div>
            <p style={{ fontSize:'20px', fontWeight:'700', color:'white', marginBottom:'10px' }}>お問い合わせを受け付けました</p>

            )}
            <button type="submit" disabled={status==='sending'}
              style={{ width:'100%', padding:'15px', background:RB, border:'none', borderRadius:'6px', color:'white', fontSize:'15px', letterSpacing:'0.1em', cursor:'pointer', fontFamily:'Noto Sans JP', fontWeight:'700', boxShadow:'0 6px 24px rgba(123,97,255,0.35)', transition:'all 0.25s ease', opacity: status==='sending'?0.6:1 }}
              onMouseEnter={e=>{if(status!=='sending'){e.currentTarget.style.opacity='0.87';e.currentTarget.style.transform='translateY(-1px)';}}}
              onMouseLeave={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='none';}}
            >{status==='sending' ? '送信中...' : '無料で送信する'}</button>
          </form>
        )}
        <div style={{ display:'flex', justifyContent:'center', gap: mob?'20px':'36px', marginTop:'28px', flexWrap:'wrap' }}>
          {[['クラウドワークス','#4D96FF'],['ココナラ','#6BCB77']].map(([l,c]) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:'8px' }}>
              <div style={{ width:'6px', height:'6px', borderRadius:'50%', background:c }} />
              <span style={{ fontSize:'13px', color:'rgba(255,255,255,0.4)', letterSpacing:'0.04em' }}>{l}でも受付中</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};
