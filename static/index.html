<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルシエルウェブデザイン | 小さなお店・個人事業主向けホームページ制作</title>
  <meta name="description" content="ルシエルウェブデザインは、美容室・整体・飲食店・個人サービス向けのホームページ制作サービスです。構成づくり、デザイン、スマホ対応、公開後の更新までサポートします。初回相談無料。" />
  <meta property="og:title" content="ルシエルウェブデザイン | 小さなお店向けホームページ制作" />
  <meta property="og:description" content="美容室・整体・飲食店・個人サービス向けに、見やすく相談しやすいホームページを制作します。初回相談無料。" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: #1a2744;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-weight: 800; }
    p { text-wrap: pretty; }

    /* Desktop nav visible, hamburger hidden by default */
    .desktop-nav { display: flex !important; }
    .hamburger  { display: none !important; }

    @media (max-width: 700px) {
      .desktop-nav { display: none !important; }
      .hamburger  { display: flex !important; }
    }

    /* Smooth anchor offset for fixed header */
    section[id], footer[id] { scroll-margin-top: 88px; }

    /* Logo responsive */
    @media (max-width: 700px) {
      .logo-ring  { width: 38px !important; height: 38px !important; }
      .logo-ring-inner { inset: 4px !important; }
      .logo-text-main { font-size: 15px !important; letter-spacing: 0.07em !important; }
      .logo-text-sub  { font-size: 9px !important; letter-spacing: 0.06em !important; }
    }

    /* Focus ring */
    a:focus-visible, button:focus-visible {
      outline: 2px solid #2d5be3;
      outline-offset: 2px;
    }

    /* CTA pulse animation */
    @keyframes cta-pulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(45,91,227,0.3); }
      50%       { box-shadow: 0 4px 24px rgba(45,91,227,0.5); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="lc-sections-a.jsx"></script>
  <script type="text/babel" src="lc-sections-b.jsx"></script>
  <script type="text/babel" src="lc-sections-c.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#2d5be3",
      "navyColor": "#1a2744",
      "heroSubtitle": "美容室・整体・飲食店・個人サービス向けに、構成づくりからデザイン、スマホ対応、公開後の更新までサポートします。",
      "showTargetBadges": true
    }/*EDITMODE-END*/;

    function App() {
      const [menuOpen, setMenuOpen] = React.useState(false);

      // Close mobile menu on resize
      React.useEffect(() => {
        const handler = () => { if (window.innerWidth > 700) setMenuOpen(false); };
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      // Tweaks panel protocol
      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);

      return (
        <React.Fragment>
          <Header menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
          <main>
            <Hero />
            <Concerns />
            <Services />
            <Pricing />
            <Works />
            <Process />
            <Profile />
            <FAQ />
            <Contact />
          </main>
          <Footer />

          {/* Tweaks Panel */}
          {tweaksOpen && (
            <div style={{
              position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
              background: '#fff', borderRadius: 14, padding: '20px 24px',
              boxShadow: '0 8px 32px rgba(0,0,0,0.18)', border: '1.5px solid #e8ecf4',
              minWidth: 260,
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <span style={{ fontWeight: 700, fontSize: 14, color: '#1a2744' }}>Tweaks</span>
                <button onClick={() => {
                  setTweaksOpen(false);
                  window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
                }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: '#6b7a99' }}>×</button>
              </div>
              <div style={{ fontSize: 12, color: '#8896b3', lineHeight: 1.7 }}>
                <p style={{ marginBottom: 8 }}>このデモでは以下の要素をカスタマイズできます：</p>
                <ul style={{ paddingLeft: 16, display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <li>アクセントカラー（ボタン・リンク）</li>
                  <li>ナビゲーションバーカラー</li>
                  <li>FAQのアコーディオン開閉</li>
                  <li>料金プランの強調表示切り替え</li>
                </ul>
                <p style={{ marginTop: 12, color: '#2d5be3', fontWeight: 500 }}>各セクションは直接クリック・スクロールでご確認いただけます。</p>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
